<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#050607" />
    <title>ЩаОплатим</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="brand">
          <img class="brand__logo" src="./assets/logo-channel.png" alt="ЩаОплатим" />
          <div>
            <p class="brand__name">ЩаОплатим</p>
            <p class="brand__caption">Оплата зарубежных подписок</p>
          </div>
        </div>
        <button class="icon-button" id="supportButton" type="button" aria-label="Поддержка">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M4 11.5a8 8 0 1 1 15.54 2.67c-.34.96-.04 2.04.64 2.8l.82.92-1.3 1.22a2.5 2.5 0 0 1-2.72.46l-1.5-.66a8 8 0 0 1-11.48-7.41Z"/>
            <path d="M8.6 11.2h.01M12 11.2h.01M15.4 11.2h.01"/>
          </svg>
        </button>
      </header>

      <section class="hero">
        <div class="hero__content">
          <h1>Зарубежные подписки в пару касаний</h1>
          <div class="hero__actions">
            <button class="primary-button" id="startOrderButton" type="button">Оформить заявку</button>
          </div>
        </div>
      </section>

      <nav class="tabs" aria-label="Разделы">
        <button class="tab is-active" type="button" data-view="catalog">Сервисы</button>
        <button class="tab" type="button" data-view="order">Заявка</button>
        <button class="tab" type="button" data-view="history">История</button>
        <button class="tab" type="button" data-view="profile">Профиль</button>
      </nav>

      <section class="view is-active" id="catalogView">
        <div class="section-head">
          <h2>Популярное</h2>
          <button class="text-button" id="customServiceButton" type="button">Другой сервис</button>
        </div>
        <div class="service-grid" id="serviceGrid"></div>
      </section>

      <section class="view" id="orderView">
        <div class="section-head">
          <h2>Заявка</h2>
          <span class="status-pill">Черновик</span>
        </div>
        <form class="order-form" id="orderForm">
          <div class="order-service-picker">
            <span class="field-title">Выберите сервис</span>
            <div class="order-service-list" id="orderServiceList"></div>
          </div>
          <input id="serviceInput" name="service" type="hidden" required />
          <div class="selected-service" id="selectedServiceSummary">
            <span class="selected-service__icon" id="selectedServiceIcon">?</span>
            <span>
              <strong id="selectedServiceName">Сервис не выбран</strong>
              <small id="selectedServicePlan">Выберите вариант выше или нажмите «Другой сервис»</small>
            </span>
          </div>
          <label class="field field--custom-service is-hidden" id="customServiceField">
            <span>Название сервиса</span>
            <input id="customServiceInput" type="text" placeholder="Например: Notion, Midjourney, PlayStation..." autocomplete="off" />
          </label>
          <label class="field">
            <span>Тариф или сумма</span>
            <input id="planInput" name="plan" type="text" placeholder="Plus на 1 месяц, $20..." autocomplete="off" required />
          </label>
          <label class="field">
            <span>Способ входа</span>
            <select id="accessInput" name="access">
              <option>Дам временный код</option>
              <option>Нужна подарочная карта</option>
              <option>Нужен новый аккаунт</option>
              <option>Обсудить в чате</option>
            </select>
          </label>
          <label class="field">
            <span>Комментарий</span>
            <textarea id="commentInput" name="comment" rows="3" placeholder="Страна аккаунта, дедлайн, важные детали"></textarea>
          </label>
          <div class="quote-box">
            <span>Предварительно</span>
            <strong id="quoteValue">Расчет после проверки</strong>
          </div>
          <button class="primary-button primary-button--wide" type="submit">Отправить заявку</button>
        </form>
      </section>

      <section class="view" id="historyView">
        <div class="section-head">
          <h2>История</h2>
          <span class="muted" id="historyCount">3 операции</span>
        </div>
        <div class="timeline" id="timeline"></div>
      </section>

      <section class="view" id="profileView">
        <div class="profile-card">
          <div class="profile-avatar" id="profileAvatar" aria-hidden="true">Г</div>
          <div>
            <h2 id="profileName">Гость</h2>
            <p>Заявки, статусы и поддержка в одном месте.</p>
          </div>
        </div>
        <div class="settings-list">
          <button class="settings-row" type="button">
            <span>Уведомления о статусах</span>
            <strong>Включены</strong>
          </button>
          <button class="settings-row" type="button">
            <span>Верификация</span>
            <strong>По запросу</strong>
          </button>
          <button class="settings-row" type="button">
            <span>Поддержка</span>
            <strong>@support</strong>
          </button>
        </div>
      </section>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="./app.js"></script>
  </body>
</html>
